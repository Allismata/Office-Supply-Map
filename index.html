  .inner{ max-width: 900px; margin: 0 auto; padding: 0 40px; }

  /* ---- hero ---- */
  .map-header{ padding-top: 48px; margin-bottom: 32px; border-bottom: 1.3px solid var(--ink); padding-bottom: 22px; }

  }

  /* ---- room grid ---- */
  .room-grid{
    display:grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 18px;
  }
  .room-tile{
    background: var(--tile); border: 1px solid var(--paper-line);
    border-radius: 12px; aspect-ratio: 1; position:relative; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 14px; padding: 20px; transition: background 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
    box-shadow: 0 1px 2px rgba(26,26,24,0.04);

  .room-tile:hover{ background: var(--tile-hover); transform: translateY(-3px); box-shadow: 0 10px 22px -10px rgba(26,26,24,0.18); }

  .room-label{ font-family: var(--display); font-weight: 700; font-size: 17px; letter-spacing: 0.005em; }
  .room-count{ font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }

  .room-badge{
    position:absolute; top:12px; right:12px; min-width:20px; height:20px; border-radius:10px;
    background: var(--alert); color:#fff; font-family: var(--mono); font-size:10.5px; font-weight:700;

  .add-room-tile{ border-style: dashed; box-shadow:none; background: transparent; }

  /* ---- attention section ---- */
  .attn-section{ margin-top: 44px; }
  .attn-title{ font-family: var(--display); font-weight:700; font-size:18px; margin-bottom:14px; border-bottom:1.3px solid var(--ink); padding-bottom:10px; }
  .attn-cols{ display:flex; flex-direction:column; gap: 22px; }
  .attn-col-head{
    display:flex; justify-content:space-between; align-items:baseline; font-weight:600; font-size:13px;

  .attn-count{ font-family: var(--mono); font-size:11px; color: var(--ink-soft); }
  .attn-row{

  .attn-row-room{ font-family: var(--mono); font-size:10px; color: var(--ink-soft); white-space:nowrap; }
  .attn-none{ font-size:12px; color: var(--ink-soft); padding: 6px 0; }

  .icon-grid{ display:grid; grid-template-columns: repeat(6, 1fr); gap:6px; }
  .icon-pick{

  .back-btn{
    font-family: var(--mono); font-size: 12px; font-weight:600; letter-spacing:0.03em;

  .filter-btn{
    font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing:0.02em;

  .filter-btn.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .add-btn{

  .item-list{ background: var(--tile); border: 1px solid var(--paper-line); border-radius: 12px; overflow:hidden; margin-top:16px; box-shadow: 0 1px 2px rgba(26,26,24,0.04); }
  .item-row{
    display:grid; grid-template-columns: 1.6fr 1.4fr 1fr 1fr 1.3fr auto;

  .item-row:last-child{ border-bottom:none; }
  .item-row.head{

  .item-notes{ font-size: 11px; color: var(--ink-soft); margin-top:2px; }
  .stock-cell{ font-family: var(--mono); font-size:12.5px; display:flex; align-items:center; gap:6px; }
  .stock-btn{

  .badge-expired{ background: var(--alert-bg); color: var(--alert); }

  function daysUntil(dateStr){
    if(!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + "T00:00:00");
    return Math.round((d - today) / 86400000);
  }

  function getStatus(p){
    if(p.stock === "" || p.stock === null || typeof p.stock === "undefined"){
      return {key:"setup", label:"SET LEVELS", cls:"badge-setup"};
    }
    const stock = Number(p.stock);
    const min = Number(p.minStock);
    const expDays = daysUntil(p.expiration);
    if(expDays !== null && expDays < 0) return {key:"expired", label:"EXPIRED", cls:"badge-expired"};
    if(expDays !== null && expDays <= 14) return {key:"soon", label:`USE SOON · ${expDays}d`, cls:"badge-soon"};
    if(stock === 0) return {key:"outofstock", label:"OUT OF STOCK", cls:"badge-outofstock"};
    if(stock <= min && p.subscription === "Yes") return {key:"monitor", label:"AUTO-ORDER DUE", cls:"badge-monitor"};
    if(stock <= min) return {key:"purchase", label:"RUNNING LOW", cls:"badge-purchase"};
    return {key:"ok", label:"OK", cls:"badge-ok"};
  }

  function needsAttention(p){
    const k = getStatus(p).key;
    return k === "purchase" || k === "monitor" || k === "soon" || k === "expired" || k === "outofstock";

async function loadRooms(){
  const { data, error } = await supabase
    .from("rooms")
    .select("*")
    .order("label");

  if(error || !data || data.length === 0){
    console.error("Supabase rooms load error:", error);
    ROOMS = DEFAULT_ROOMS.slice();

    for (const r of ROOMS) {
      await supabase.from("rooms").upsert({
        key: r.key,
        label: r.label,
        icon_key: r.iconKey,
        categories: r.categories || []
      });
    }
  } else {
    ROOMS = data.map(r => ({
      key: r.key,
      label: r.label,
      iconKey: r.icon_key,
      categories: r.categories || []
    }));
  }
}

async function saveRooms(){
  for (const r of ROOMS) {
    const { error } = await supabase
      .from("rooms")
      .upsert({
        key: r.key,
        label: r.label,
        icon_key: r.iconKey,
        categories: r.categories || []
      });

    if(error){
      console.error("Supabase rooms save error:", error);
    }
  }
}

async function load(){
  await loadRooms();

  const { data, error } = await supabase
    .from("products")
    .select("*");

  if(error){
    console.error("Supabase products load error:", error);
    products = [];
  } else {
    products = data.map(p => ({
      id: p.id,
      name: p.name,
      room: p.room,
      category: p.category,
      stock: p.stock === null ? "" : p.stock,
      minStock: p.min_stock === null ? "" : p.min_stock,
      unit: p.unit || "",
      subscription: p.subscription || "No",
      frequency: p.frequency || "",
      lastOrdered: p.last_ordered || "",
      expiration: p.expiration || "",
      section: p.section || "",
      notes: p.notes || ""
    }));
  }

  loaded = true;
  render();
}

    }
  }
}

  function itemsForRoom(roomKey){
    const room = ROOMS.find(r => r.key === roomKey);
    if(!room) return [];
    return products.filter(p => p.room ? p.room === roomKey : (room.categories || []).includes(p.category));
  }

  function roomForProduct(p){
    return ROOMS.find(r => p.room ? r.key === p.room : (r.categories || []).includes(p.category));
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function render(){
    if(!loaded){ root.innerHTML = '<div class="loading">Loading your stock list…</div>'; return; }
    if(view === "map") renderMap(); else renderDetail(view);
  }

  function attentionBuckets(items){
    const buckets = { low: [], out: [], soon: [], expired: [] };
    items.forEach(p => {
      const st = getStatus(p);
      const entry = { p, room: roomForProduct(p) };
      if(st.key === "expired") buckets.expired.push(entry);
      else if(st.key === "soon") buckets.soon.push(entry);
      else if(st.key === "outofstock") buckets.out.push(entry);
      else if(st.key === "purchase" || st.key === "monitor") buckets.low.push(entry);
    });
    return buckets;
  }

  function attnColumn(title, entries, showRoom){
    const rows = entries.length === 0
      ? `<div class="attn-none">None</div>`
      : entries.slice(0, 8).map(({p, room}) => `
          <div class="attn-row" data-id="${p.id}" data-room="${room ? room.key : ''}">
            <span class="attn-row-name">${escapeHtml(p.name)}</span>
            ${showRoom ? `<span class="attn-row-room">${room ? escapeHtml(room.label) : ''}</span>` : ""}
          </div>
        `).join("");
    return `
      <div class="attn-col">
        <div class="attn-col-head"><span>${title}</span><span class="attn-count">${entries.length}</span></div>
        ${rows}
      </div>
    `;
  }

  function attnSectionHtml(buckets, showRoom){
    return `
      <div class="attn-section">
        <div class="attn-title">Attention</div>
        <div class="attn-cols">
          ${attnColumn("Expired", buckets.expired, showRoom)}
          ${attnColumn("Expiring", buckets.soon, showRoom)}
          ${attnColumn("Out of stock", buckets.out, showRoom)}
          ${attnColumn("Running low", buckets.low, showRoom)}
        </div>
      </div>
    `;
  }

  function renderMap(){
    const tiles = ROOMS.map(room => {
      const items = itemsForRoom(room.key);
      const alertCount = items.filter(needsAttention).length;
      return `
        <div class="room-tile" data-room="${room.key}" tabindex="0" role="button" aria-label="Open ${room.label}">
          ${alertCount > 0 ? `<span class="room-badge">${alertCount}</span>` : ""}
          <div class="room-icon">${getIcon(room.iconKey)}</div>
          <div class="room-label">${escapeHtml(room.label)}</div>
          <div class="room-count">${items.length} items</div>
        </div>
      `;
    }).join("");

    root.innerHTML = `
      <div class="inner">
        <div class="map-header">
          <div class="map-eyebrow">Office Supply Map</div>
        </div>
        <div class="room-grid">
          ${tiles}
          <div class="room-tile add-room-tile" id="add-room-tile" tabindex="0" role="button" aria-label="Add room">
            <div class="room-icon" style="opacity:.5"><svg viewBox="0 0 64 64"><line x1="32" y1="14" x2="32" y2="50"/><line x1="14" y1="32" x2="50" y2="32"/></svg></div>
            <div class="room-label" style="color:var(--ink-soft)">Add room</div>
          </div>
        </div>

        ${attnSectionHtml(attentionBuckets(products), true)}
      </div>
    `;

    root.querySelectorAll(".room-tile[data-room]").forEach(tile => {
      const open = () => {  statusFilter = "all";
  setView(tile.dataset.room);
};
      tile.onclick = open;
      tile.onkeydown = (e) => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); open(); } };
    });
    document.getElementById("add-room-tile").onclick = () => openRoomModal();
    document.getElementById("add-room-tile").onkeydown = (e) => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openRoomModal(); } };
    root.querySelectorAll(".attn-row[data-room]").forEach(row => {
      row.onclick = () => { if(row.dataset.room){ statusFilter = "all";
setView(row.dataset.room); } };
    });
  }

  function renderDetail(roomKey){
    const room = ROOMS.find(r => r.key === roomKey);
    let items = itemsForRoom(roomKey);
    if(statusFilter !== "all") items = items.filter(p => getStatus(p).key === statusFilter);

    const statusCounts = {setup:0, purchase:0, monitor:0, soon:0, expired:0, outofstock:0, ok:0};
    itemsForRoom(roomKey).forEach(p => statusCounts[getStatus(p).key]++);

const grouped = {};
items.forEach(p => {
  const section = p.section && p.section.trim() ? p.section.trim() : "Other";
  if(!grouped[section]) grouped[section] = [];
  grouped[section].push(p);
});

const rows = Object.keys(grouped).map(section => {
  const sectionHeader = `
    <div class="item-row head">
      <div style="font-size:13px; color:var(--ink);">${escapeHtml(section)}</div>
      <div></div><div></div><div></div><div></div><div></div>
    </div>
  `;

  const sectionRows = grouped[section].map(p => {
    const st = getStatus(p);
    const low = p.stock !== "" && Number(p.stock) <= Number(p.minStock);
    const stockDisplay = (p.stock === "" || p.stock === null)
      ? `<span class="stock-unset">not set</span>`
      : `<span class="${low ? 'stock-low' : ''}">${p.stock}</span><span style="color:var(--ink-soft)">/${p.minStock !== "" ? p.minStock : "–"} ${escapeHtml(p.unit||"")}</span>`;

    return `
      <div class="item-row">
        <div>
          <div class="item-name">${escapeHtml(p.name)}</div>
          ${p.notes ? `<div class="item-notes">${escapeHtml(p.notes)}</div>` : ""}
        </div>
        <div class="stock-cell">
          <button class="stock-btn" data-stock-adj="${p.id}" data-dir="-1">–</button>
          ${stockDisplay}
          <button class="stock-btn" data-stock-adj="${p.id}" data-dir="1">+</button>
        </div>
        <div>${p.subscription === "Yes" ? `<span class="sub-yes">✓ ${escapeHtml(p.frequency||"Yes")}</span>` : `<span class="sub-no">—</span>`}</div>
        <div class="exp-cell">${p.expiration || "—"}</div>
        <div><span class="badge ${st.cls}">${st.label}</span></div>
        <div class="row-actions">
          <button class="icon-btn" data-edit="${p.id}" title="Edit">✎</button>
          <button class="icon-btn btn-danger" data-delete="${p.id}" title="Delete">🗑</button>
        </div>
      </div>
    `;
  }).join("");

  return sectionHeader + sectionRows;
}).join("");

    root.innerHTML = `
      <div class="inner">
        <div class="detail-header" style="padding-top:40px;">
          <button class="back-btn" id="back-btn">← Map</button>
          <div class="detail-icon">${getIcon(room.iconKey)}</div>
          <div>
            <div class="detail-title">${escapeHtml(room.label)} <button class="icon-btn" id="edit-room-btn" title="Edit room" style="margin-left:4px; vertical-align:middle;">✎</button></div>
            <div class="detail-sub">${itemsForRoom(roomKey).length} items</div>
          </div>
        </div>

        <div class="toolbar">
          <div class="filters">
            ${filterBtn("all","All")}
            ${filterBtn("outofstock","Out of Stock", statusCounts.outofstock)}
            ${filterBtn("purchase","Running Low", statusCounts.purchase)}
            ${filterBtn("soon","Expiring", statusCounts.soon)}
            ${filterBtn("expired","Expired", statusCounts.expired)}
          </div>
          <button class="add-btn" id="add-btn">+ Add Item</button>
        </div>

        <div class="item-list">
          <div class="item-row head"><div>Product</div><div>Stock</div><div>Subscription</div><div>Expires</div><div>Status</div><div></div></div>
          ${items.length === 0 ? `<div class="empty-state">Nothing here yet. Add an item to start tracking ${room.label.toLowerCase()}.</div>` : rows}
        </div>
      </div>
    `;

    document.getElementById("back-btn").onclick = () => {setView("map"); };
    document.getElementById("edit-room-btn").onclick = (e) => { e.stopPropagation(); openRoomModal(room.key); };
    document.getElementById("add-btn").onclick = () => openModal(null, room);
    root.querySelectorAll(".filter-btn").forEach(btn => {
      btn.onclick = () => { statusFilter = btn.dataset.filter; render(); };
    });
    root.querySelectorAll("[data-edit]").forEach(btn => { btn.onclick = () => openModal(btn.dataset.edit, room); });
    root.querySelectorAll("[data-delete]").forEach(btn => { btn.onclick = () => deleteProduct(btn.dataset.delete); });
    root.querySelectorAll("[data-stock-adj]").forEach(btn => { btn.onclick = () => adjustStock(btn.dataset.stockAdj, parseInt(btn.dataset.dir)); });
  }

  function filterBtn(key, label, count){
    const suffix = typeof count === "number" ? ` (${count})` : "";
    return `<button class="filter-btn ${statusFilter===key?'active':''}" data-filter="${key}">${label}${suffix}</button>`;
  }

  async function adjustStock(id, dir){
    const p = products.find(x => x.id === id);
    if(!p) return;
    const current = (p.stock === "" || p.stock === null) ? 0 : Number(p.stock);
    p.stock = Math.max(0, current + dir);
    await save();
    render();
  }

 async function deleteProduct(id){
  if(!confirm("Remove this item from the tracker?")) return;

  const { error } = await supabase
    .from("products")
    .delete()
    .eq("id", id);

  if(error){
    console.error("Supabase product delete error:", error);
    alert("Could not delete item. Check console for details.");
    return;
  }

  products = products.filter(p => p.id !== id);
  render();
}

  function openRoomModal(existingKey){
    const existing = existingKey ? ROOMS.find(r => r.key === existingKey) : null;
    let selectedIcon = existing ? existing.iconKey : "box";
    const iconKeys = ["closet","box","conference","library","lounge","mailroom","breakroom","drop","pantry","kitchen","bathroom","office"];
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <h3>${existing ? "Edit room" : "Add room"}</h3>
        <div class="field"><label>Title</label><input id="r-title" value="${existing ? escapeHtml(existing.label) : ''}" placeholder="e.g. Storage Closet"/></div>
        <div class="field">
          <label>Icon</label>
          <div class="icon-grid" id="r-icon-grid">
            ${iconKeys.map(k => `<button type="button" class="icon-pick ${k===selectedIcon?'selected':''}" data-icon="${k}">${ICONS[k]}</button>`).join("")}
          </div>
        </div>
      <div class="modal-actions">
  ${existing ? `<button class="btn-secondary btn-danger" id="r-delete">Delete room</button>` : ""}
  <button class="btn-secondary" id="r-cancel">Cancel</button>
  <button class="btn-primary" id="r-save">${existing ? "Save Changes" : "Add room"}</button>
</div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    document.getElementById("r-cancel").onclick = () => overlay.remove();
    if(existing){
  document.getElementById("r-delete").onclick = async () => {
    const itemsInRoom = products.filter(p => p.room === existing.key);

    if(itemsInRoom.length > 0){
      alert("Move or delete the items in this room before deleting the room.");
      return;
    }

    if(!confirm(`Delete "${existing.label}"?`)) return;

    const { error } = await supabase
      .from("rooms")
      .delete()
      .eq("key", existing.key);

    if(error){
      console.error("Supabase room delete error:", error);
      alert("Could not delete room.");
      return;
    }

    ROOMS = ROOMS.filter(r => r.key !== existing.key);
    view = "map";
    overlay.remove();
    render();
  };
}
    const grid = document.getElementById("r-icon-grid");
    grid.querySelectorAll(".icon-pick").forEach(btn => {
      btn.onclick = () => {
        grid.querySelectorAll(".icon-pick").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedIcon = btn.dataset.icon;
      };
    });
    document.getElementById("r-save").onclick = async () => {
      const title = document.getElementById("r-title").value.trim();
      if(!title) return;
      if(existing){
        existing.label = title;
        existing.iconKey = selectedIcon;
      } else {
        const key = "room_" + Date.now() + "_" + Math.floor(Math.random()*1000);
        ROOMS.push({ key, label: title, iconKey: selectedIcon, categories: [] });
      }
      await saveRooms();
      overlay.remove();
      render();
    };
  }

  function openModal(id, room){
    const p = id ? products.find(x => x.id === id) : {
      name:"", room: room ? room.key : "", stock:"", minStock:"", unit:"",
      subscription:"No", frequency:"", lastOrdered:"", expiration:"", notes:""
    };
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <h3>${id ? "Edit Item" : `Add Item — ${room.label}`}</h3>
        <div class="field"><label>Product Name</label><input id="f-name" value="${escapeHtml(p.name)}" placeholder="e.g. Copy Paper"/></div>
        <div class="field-row">
          <div class="field"><label>Unit</label><input id="f-unit" value="${escapeHtml(p.unit)}" placeholder="e.g. boxes"/></div>
          <div class="field">
            <label>Auto Subscription?</label>
            <select id="f-subscription">
              <option value="No" ${p.subscription==="No"?"selected":""}>No</option>
              <option value="Yes" ${p.subscription==="Yes"?"selected":""}>Yes</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>Current Stock</label><input id="f-stock" type="number" value="${p.stock}" placeholder="not set"/></div>
          <div class="field"><label>Minimum Stock</label><input id="f-minstock" type="number" value="${p.minStock}" placeholder="not set"/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Last Ordered</label><input id="f-lastordered" type="date" value="${p.lastOrdered||''}"/></div>
          <div class="field"><label>Expiration Date</label><input id="f-expiration" type="date" value="${p.expiration||''}"/></div>
        </div>
        <div class="field">
  <label>Section</label>
  <input
    id="f-section"
    value="${escapeHtml(p.section || '')}"
    placeholder="e.g. Drinks, Bars, Supplements"
  />
</div>
        <div class="field"><label>Notes</label><input id="f-notes" value="${escapeHtml(p.notes||'')}" placeholder="optional"/></div>
        <div class="modal-actions">
          <button class="btn-secondary" id="f-cancel">Cancel</button>
          <button class="btn-primary" id="f-save">${id ? "Save Changes" : "Add Item"}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById("f-cancel").onclick = () => overlay.remove();
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    document.getElementById("f-save").onclick = async () => {
      const stockRaw = document.getElementById("f-stock").value;
      const minRaw = document.getElementById("f-minstock").value;
      const data = {
        name: document.getElementById("f-name").value.trim() || "Untitled Item",
        room: p.room || (room ? room.key : ""),
        unit: document.getElementById("f-unit").value.trim(),
        stock: stockRaw === "" ? "" : Number(stockRaw),
        minStock: minRaw === "" ? "" : Number(minRaw),
        subscription: document.getElementById("f-subscription").value,
        frequency: document.getElementById("f-subscription").value === "Yes" ? "Monthly" : "",
        lastOrdered: document.getElementById("f-lastordered").value,
        expiration: document.getElementById("f-expiration").value,
section: document.getElementById("f-section").value.trim(),
notes: document.getElementById("f-notes").value.trim() };
      if(id){ Object.assign(p, data); } else { products.push({id: uid(), ...data}); }
      await save();
      overlay.remove();
      render();
    };
  }

  load();
})();
